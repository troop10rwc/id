name: deploy

# Deploys the hub to Cloudflare on every push to main. Independent of the kit
# repo — this repo owns its own Worker, D1, and route.
on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read # pull @troop10rwc/* from GitHub Packages

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        env:
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm build # build the passkey island into ./public before deploy

      # Applies any new D1 migrations, then deploys the Worker + assets.
      - name: Apply D1 migrations
        run: pnpm exec wrangler d1 migrations apply troop10-id --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
